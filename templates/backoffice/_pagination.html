{% if page_obj.has_other_pages %}
<nav class="bo-pagination" aria-label="Paginación">
    {% if page_obj.has_previous %}
        <a href="?page={{ page_obj.previous_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.status %}&status={{ request.GET.status }}{% endif %}{% if request.GET.segment %}&segment={{ request.GET.segment }}{% endif %}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}{% if request.GET.brand %}&brand={{ request.GET.brand }}{% endif %}{% if request.GET.sort %}&sort={{ request.GET.sort }}{% endif %}{% if request.GET.dir %}&dir={{ request.GET.dir }}{% endif %}" class="bo-pagination__link">← Anterior</a>
    {% endif %}
    <span class="bo-pagination__info">
        Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}
        &nbsp;·&nbsp; {{ page_obj.paginator.count }} resultados
    </span>
    {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.status %}&status={{ request.GET.status }}{% endif %}{% if request.GET.segment %}&segment={{ request.GET.segment }}{% endif %}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}{% if request.GET.brand %}&brand={{ request.GET.brand }}{% endif %}{% if request.GET.sort %}&sort={{ request.GET.sort }}{% endif %}{% if request.GET.dir %}&dir={{ request.GET.dir }}{% endif %}" class="bo-pagination__link">Siguiente →</a>
    {% endif %}
</nav>
{% endif %}
