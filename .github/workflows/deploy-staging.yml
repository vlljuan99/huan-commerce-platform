name: Deploy → Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      skip_ci:
        description: "⚡ Skip CI checks (lint, tests) — fast deploy to staging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  ci:
    name: CI checks (lint + tests)
    if: github.event_name == 'push' || inputs.skip_ci == 'false'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: huan
          POSTGRES_PASSWORD: huan
          POSTGRES_DB: huan_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.base
      DATABASE_URL: postgres://huan:huan@localhost:5432/huan_test
      SECRET_KEY: ci-insecure-key-only-for-testing
      DEBUG: "False"
      OPENAI_API_KEY: sk-fake-key-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest

  deploy:
    name: Deploy to Heroku Staging
    runs-on: ubuntu-latest
    needs: [ci]
    if: always() && (needs.ci.result == 'success' || needs.ci.result == 'skipped')


    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect & upload static files to Azure
        env:
          DJANGO_SETTINGS_MODULE: config.settings.staging
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          AZURE_STATIC_CONTAINER: ${{ secrets.AZURE_STATIC_CONTAINER }}
        run: python manage.py collectstatic --noinput

      - name: Deploy to Heroku via git push
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP: ${{ secrets.STAGING_APP_NAME }}
        run: |
          git remote add heroku https://heroku:${HEROKU_API_KEY}@git.heroku.com/${HEROKU_APP}.git
          git push heroku HEAD:refs/heads/main --force

      - name: Run migrations on staging
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP: ${{ secrets.STAGING_APP_NAME }}
        run: |
          curl -s -X POST https://api.heroku.com/apps/${HEROKU_APP}/dynos \
            -d '{"command":"python manage.py migrate --noinput","attach":false,"size":"standard-1x","type":"run"}' \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3" \
            -H "Authorization: Bearer ${HEROKU_API_KEY}"

      - name: Notify deploy complete
        run: echo "✅ Staging deploy complete — ${{ secrets.STAGING_APP_NAME }}.herokuapp.com"
