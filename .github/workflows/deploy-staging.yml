name: Deploy → Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      skip_ci:
        description: "⚡ Skip CI checks (lint, tests) — fast deploy to staging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  ci:
    name: CI checks (lint + tests)
    if: github.event_name == 'push' || inputs.skip_ci == 'false'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: huan
          POSTGRES_PASSWORD: huan
          POSTGRES_DB: huan_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.base
      DATABASE_URL: postgres://huan:huan@localhost:5432/huan_test
      SECRET_KEY: ci-insecure-key-only-for-testing
      DEBUG: "False"
      OPENAI_API_KEY: sk-fake-key-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest

  deploy:
    name: Deploy to Heroku Staging
    runs-on: ubuntu-latest
    needs: [ci]
    if: always() && (needs.ci.result == 'success' || needs.ci.result == 'skipped')


    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.STAGING_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          buildpack: "https://github.com/heroku/heroku-buildpack-apt"

      - name: Run migrations on staging
        run: |
          curl -n -X POST https://api.heroku.com/apps/${{ secrets.STAGING_APP_NAME }}/dynos \
            -d '{"command":"python manage.py migrate --noinput","attach":false,"size":"standard-1x","type":"run"}' \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3" \
            -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}"

      - name: Notify deploy complete
        run: echo "✅ Staging deploy complete — ${{ secrets.STAGING_APP_NAME }}.herokuapp.com"
