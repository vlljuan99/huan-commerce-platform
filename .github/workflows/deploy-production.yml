name: Deploy → Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  deploy:
    name: Deploy to Heroku Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.PRODUCTION_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          buildpack: "https://github.com/heroku/heroku-buildpack-apt"

      - name: Run migrations on production
        run: |
          curl -n -X POST https://api.heroku.com/apps/${{ secrets.PRODUCTION_APP_NAME }}/dynos \
            -d '{"command":"python manage.py migrate --noinput","attach":false,"size":"standard-1x","type":"run"}' \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3" \
            -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deploy complete
        run: echo "🚀 Production deploy complete — ${{ secrets.PRODUCTION_APP_NAME }}.herokuapp.com — tag ${{ github.ref_name }}"
